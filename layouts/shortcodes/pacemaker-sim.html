<div class="pacemaker-sim-container" style="font-family: ui-sans-serif, system-ui, sans-serif; border: 1px solid #ced4da; padding: 24px; border-radius: 12px; background: #ffffff; max-width: 880px; margin: 2rem auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 16px;">
        <div>
            <h3 style="margin: 0 0 8px 0; color: #212529;">Dual-Chamber Timing State Machine</h3>
            <p style="font-size: 0.9em; color: #495057; margin: 0; background: #f8f9fa; padding: 4px 8px; border-radius: 4px; display: inline-block;">
                Base Rate: 60 ppm | <strong>LRI:</strong> 1000ms | <strong>AVI:</strong> 200ms | <strong>V-A:</strong> 800ms
            </p>
            <div style="display: flex; gap: 20px; margin-top: 12px;">
                <div>
                    <div style="font-size: 0.75em; text-transform: uppercase; color: #6c757d; font-weight: bold;">Last A-A Cycle</div>
                    <div id="aaStats" style="font-size: 1.2em; font-weight: bold; color: #6f42c1;">1000 ms (60 ppm)</div>
                </div>
                <div>
                    <div style="font-size: 0.75em; text-transform: uppercase; color: #6c757d; font-weight: bold;">Last V-V Cycle</div>
                    <div id="vvStats" style="font-size: 1.2em; font-weight: bold; color: #dc3545;">1000 ms (60 ppm)</div>
                </div>
            </div>
        </div>
        
        <div style="text-align: right; display: flex; flex-direction: column; gap: 12px;">
            <div style="background: #e9ecef; padding: 4px; border-radius: 6px; display: inline-flex; justify-content: flex-end;">
                <button id="btnVent" style="border: none; background: #0d6efd; color: white; padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; transition: all 0.2s;">Ventricular-Based</button>
                <button id="btnAtr" style="border: none; background: transparent; color: #495057; padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; transition: all 0.2s;">Atrial-Based</button>
            </div>
            <div style="display: flex; gap: 8px; justify-content: flex-end;">
                <button id="triggerConductionBtn" style="background: #198754; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: transform 0.1s;">
                    Queue Intrinsic (AR=150)
                </button>
                <button id="triggerPvcBtn" style="background: #d63384; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: transform 0.1s;">
                    Trigger PVC (Instant)
                </button>
            </div>
        </div>
    </div>

    <canvas id="simCanvas" width="830" height="360" style="background: #fdfdfe; border: 1px solid #dee2e6; border-radius: 8px; width: 100%; display: block;"></canvas>
    
    <div id="statusText" style="margin-top: 16px; font-size: 0.95em; color: #0d6efd; font-weight: 600; text-align: center; height: 20px;">
        Tracking normally in Ventricular mode.
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    const btnVent = document.getElementById('btnVent');
    const btnAtr = document.getElementById('btnAtr');
    const triggerConductionBtn = document.getElementById('triggerConductionBtn');
    const triggerPvcBtn = document.getElementById('triggerPvcBtn');
    const statusText = document.getElementById('statusText');

    // Clinical Parameters (1000ms = 200px -> 1px = 5ms)
    const LRI = 1000; 
    const AVI = 200;  
    const VAI = 800;  
    const AR_DELAY = 150; 

    // Simulation State
    let t = 0;
    let mode = 'ventricular';
    let queueIntrinsic = false;
    
    let lastAp = -1000;
    let lastV = -800; 
    let nextAp = 0;
    let nextVp = 200;
    
    let prevApTime = -2000;
    let prevVTime = -1800;
    let activeAV = false;

    let events = []; 
    let timers = []; 
    
    startTimer('VA (Escape)', -800, 800, "#fd7e14", 260);

    function setStatus(msg, color = '#0d6efd') {
        statusText.style.color = color;
        statusText.innerText = msg;
    }

    function updateStats(elementId, current, previous) {
        let cycleMs = current - previous;
        let ppm = Math.round(60000 / cycleMs);
        document.getElementById(elementId).innerText = `${cycleMs} ms (${ppm} ppm)`;
    }

    function setMode(newMode) {
        mode = newMode;
        if(mode === 'ventricular') {
            btnVent.style.background = '#0d6efd'; btnVent.style.color = '#fff';
            btnAtr.style.background = 'transparent'; btnAtr.style.color = '#495057';
            setStatus("Mode: Ventricular-Based (Vs resets V-A interval)", "#0d6efd");
        } else {
            btnAtr.style.background = '#0d6efd'; btnAtr.style.color = '#fff';
            btnVent.style.background = 'transparent'; btnVent.style.color = '#495057';
            setStatus("Mode: Atrial-Based (A-A master clock remains fixed)", "#6f42c1");
        }
    }

    // Timer Logic
    function startTimer(label, startT, limit, color, y) {
        timers.push({ label, startT, limit, actual: 0, active: true, color, y });
    }

    function stopTimer(labelPrefix, endT) {
        let timer = timers.find(tm => tm.label.startsWith(labelPrefix) && tm.active);
        if (timer) {
            timer.active = false;
            timer.actual = endT - timer.startT;
        }
    }

    function processTimers() {
        timers.forEach(tm => {
            if (tm.active) {
                tm.actual = Math.min(t - tm.startT, tm.limit);
                if (tm.actual >= tm.limit) tm.active = false;
            }
        });
    }

    function drawGrid() {
        ctx.strokeStyle = '#f1f3f5'; ctx.lineWidth = 1;
        for(let i = 0; i < canvas.width; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
        for(let j = 0; j < canvas.height; j += 20) { ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke(); }
        
        ctx.strokeStyle = '#adb5bd'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(0, 110); ctx.lineTo(t / 5, 110); ctx.stroke();
        
        ctx.fillStyle = "#f8f9fa"; ctx.fillRect(0, 180, canvas.width, 180);
        ctx.strokeStyle = '#dee2e6';
        ctx.beginPath(); ctx.moveTo(0, 180); ctx.lineTo(canvas.width, 180); ctx.stroke();
    }

    function drawSpike(tPos, type) {
        let xPos = tPos / 5;
        ctx.lineWidth = 2.5; ctx.font = 'bold 12px system-ui';
        
        if (type === 'Ap') {
            ctx.strokeStyle = '#0d6efd'; ctx.fillStyle = '#0d6efd';
            ctx.beginPath(); ctx.moveTo(xPos, 110); ctx.lineTo(xPos, 80); ctx.lineTo(xPos, 110); ctx.stroke();
            ctx.fillText('Ap', xPos - 8, 70);
            ctx.beginPath(); ctx.arc(xPos + 10, 110, 8, Math.PI, 0); ctx.stroke();
        } else {
            let isSensed = type === 'Vs' || type === 'PVC';
            ctx.strokeStyle = isSensed ? '#dc3545' : '#212529'; 
            ctx.fillStyle = isSensed ? '#dc3545' : '#212529';
            
            // Draw wider, deeper spike for PVC to distinguish it visually
            if (type === 'PVC') {
                ctx.beginPath(); ctx.moveTo(xPos - 4, 110); ctx.lineTo(xPos, 10); ctx.lineTo(xPos + 10, 170); ctx.lineTo(xPos + 16, 110); ctx.stroke();
                ctx.fillText('PVC', xPos - 10, 0);
            } else {
                ctx.beginPath(); ctx.moveTo(xPos, 110); ctx.lineTo(xPos, 30); ctx.lineTo(xPos + 6, 160); ctx.lineTo(xPos + 12, 110); ctx.stroke();
                ctx.fillText(type, xPos - 8, 20);
            }
            ctx.beginPath(); ctx.arc(xPos + 30, 110, 14, Math.PI, 0); ctx.stroke();
        }
    }

    function drawVisualTimers() {
        timers.forEach(tm => {
            let startX = tm.startT / 5;
            let limitW = tm.limit / 5;
            let actualW = tm.actual / 5;
            
            if (startX + limitW < 0) return; 
            
            ctx.fillStyle = "#e9ecef"; ctx.fillRect(startX, tm.y, limitW, 14);
            ctx.strokeStyle = "#ced4da"; ctx.strokeRect(startX, tm.y, limitW, 14);
            
            if (actualW > 0) {
                ctx.fillStyle = tm.color;
                ctx.fillRect(startX, tm.y, actualW, 14);
            }
            
            if (startX > -50 && startX < canvas.width) {
                ctx.fillStyle = "#495057"; ctx.font = "11px system-ui";
                ctx.fillText(`${tm.label} (${tm.limit}ms)`, startX, tm.y - 6);
                
                if (!tm.active && tm.actual < tm.limit) {
                    ctx.fillStyle = "#dc3545";
                    ctx.fillText(`Aborted at ${tm.actual}ms`, startX + actualW + 4, tm.y + 11);
                }
            }
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();

        // 1. Process queued Intrinsic Beat (Vs) at exactly 150ms after Ap
        if (queueIntrinsic && activeAV && t >= lastAp + AR_DELAY) {
            let vsTime = lastAp + AR_DELAY;
            events.push({t: vsTime, type: 'Vs'});
            lastV = vsTime;
            activeAV = false;
            queueIntrinsic = false;
            
            stopTimer('A-V', vsTime);
            stopTimer('V-A', vsTime); 
            startTimer('V-A (Escape)', vsTime, VAI, "#fd7e14", 260);
            
            if (mode === 'ventricular') {
                stopTimer('A-A', vsTime); 
                nextAp = lastV + VAI;     
                setStatus("Vs sensed at 150ms: A-A clock aborted, V-A timer reset.", "#dc3545");
            } else {
                setStatus("Vs sensed at 150ms: Pace inhibited, A-A clock continues.", "#dc3545");
            }
            updateStats('vvStats', vsTime, prevVTime);
            prevVTime = vsTime;
        }

        // 2. Process Atrial Pace (Ap)
        if (t >= nextAp) {
            let apTime = nextAp;
            events.push({t: apTime, type: 'Ap'});
            lastAp = apTime;
            activeAV = true;
            
            stopTimer('A-A', apTime);
            stopTimer('V-A', apTime);
            
            startTimer('A-A (Master)', apTime, LRI, "#6f42c1", 210);
            startTimer('A-V (Delay)', apTime, AVI, "#20c997", 310);
            
            if (mode === 'atrial') {
                nextAp = lastAp + LRI; 
            } else {
                nextAp = apTime + AVI + VAI; 
            }
            nextVp = apTime + AVI;
            
            updateStats('aaStats', apTime, prevApTime);
            prevApTime = apTime;
        }

        // 3. Process Ventricular Pace (Vp)
        if (t >= nextVp && activeAV) {
            let vpTime = nextVp;
            events.push({t: vpTime, type: 'Vp'});
            lastV = vpTime;
            activeAV = false;
            
            stopTimer('A-V', vpTime);
            startTimer('V-A (Escape)', vpTime, VAI, "#fd7e14", 260);
            
            if (mode === 'ventricular') {
                nextAp = lastV + VAI; 
            }
            updateStats('vvStats', vpTime, prevVTime);
            prevVTime = vpTime;
        }

        processTimers();
        drawVisualTimers();
        events.forEach(e => { if (e.t <= t) drawSpike(e.t, e.type); });

        ctx.beginPath(); ctx.moveTo(t/5, 0); ctx.lineTo(t/5, canvas.height);
        ctx.strokeStyle = 'rgba(13, 110, 253, 0.4)'; ctx.lineWidth = 3; ctx.stroke();

        t += 6; 

        if (t >= 4150) {
            t -= 4150;
            lastAp -= 4150; lastV -= 4150;
            nextAp -= 4150; nextVp -= 4150;
            prevApTime -= 4150; prevVTime -= 4150;
            
            events = events.map(e => ({t: e.t - 4150, type: e.type})).filter(e => e.t >= -1000);
            timers = timers.map(tm => ({...tm, startT: tm.startT - 4150})).filter(tm => tm.startT + tm.limit >= -1000);
        }

        requestAnimationFrame(animate);
    }

    // Button Listeners
    btnVent.addEventListener('click', () => setMode('ventricular'));
    btnAtr.addEventListener('click', () => setMode('atrial'));
    
    triggerConductionBtn.addEventListener('click', () => {
        queueIntrinsic = true;
        setStatus("Waiting for next Ap to trigger AR conduction...", "#198754");
    });

    triggerPvcBtn.addEventListener('click', () => {
        // Prevent triggering if we are in the AV interval or in refractory (too close to last beat)
        if (activeAV) {
            setStatus("Cannot trigger PVC during AV delay. Wait for V-A interval.", "#d63384");
            return;
        }
        if (t - lastV < 250) {
            setStatus("Refractory period: Cannot sense PVC yet.", "#d63384");
            return;
        }

        let pvcTime = t;
        events.push({t: pvcTime, type: 'PVC'});
        lastV = pvcTime;

        stopTimer('A-A', pvcTime);
        stopTimer('V-A', pvcTime);

        if (mode === 'ventricular') {
            // Ventricular Mode: Resets the V-A interval
            startTimer('V-A (Escape)', pvcTime, VAI, "#fd7e14", 260);
            nextAp = pvcTime + VAI;
            setStatus("PVC Sensed: V-A timer reset (Next beat in 800ms).", "#fd7e14");
        } else {
            // Atrial Mode: Resets the A-A interval (Compensatory Pause)
            startTimer('A-A (Compensatory)', pvcTime, LRI, "#d63384", 210);
            nextAp = pvcTime + LRI;
            setStatus("PVC Sensed: A-A timer reset (Compensatory Pause). Rate Drops!", "#d63384");
        }

        nextVp = nextAp + AVI;
        updateStats('vvStats', pvcTime, prevVTime);
        prevVTime = pvcTime;
    });

    requestAnimationFrame(animate);
</script>
